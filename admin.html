<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Yuji Store</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container { max-width: 800px; margin: 50px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .login-form { text-align: center; }
        .login-form input, .login-form textarea { width: 100%; padding: 10px; margin: 10px 0; border: 2px solid #e2e8f0; border-radius: 8px; }
        .stock-list { margin: 20px 0; max-height: 400px; overflow-y: auto; border: 1px solid #e2e8f0; padding: 15px; border-radius: 8px; }
        .stock-item { margin: 10px 0; padding: 10px; background: #f7fafc; border-radius: 8px; display: flex; align-items: center; gap: 10px; }
        .stock-item label { flex: 2; font-weight: 600; }
        .stock-item input { flex: 1; width: 100px; padding: 8px; border: 2px solid #e2e8f0; border-radius: 5px; }
        .btn-admin { background: #48bb78; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 1rem; margin: 5px; }
        .btn-admin:hover { background: #38a169; }
        .logout { float: right; background: #e53e3e; color: white; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer; }
        .info { background: #e6f7ff; padding: 10px; border-radius: 5px; margin: 10px 0; font-size: 0.9rem; text-align: left; }
        .status-message { margin-top: 20px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>
    <div class="admin-container">
        <h1 style="text-align:center;">🔧 Admin Panel</h1>
        
        <div id="loginSection" class="login-form">
            <div class="info">
                <strong>⚠️ KHUSUS ADMIN ⚠️</strong><br>
                Masukkan token GitHub dan informasi repository tempat menyimpan stock.json.
            </div>
            <input type="text" id="githubToken" placeholder="GitHub Token" required>
            <input type="text" id="repoOwner" placeholder="Owner (username)" required>
            <input type="text" id="repoName" placeholder="Nama Repository" required>
            <input type="text" id="filePath" placeholder="Path file (misal: stock.json)" value="stock.json" required>
            <input type="text" id="branch" placeholder="Branch (misal: main)" value="main" required>
            <button class="btn-admin" onclick="loginWithToken()">Login & Muat Stok</button>
        </div>

        <div id="stockSection" style="display:none;">
            <button class="logout" onclick="logout()">Logout</button>
            <h3>Update Stok Produk</h3>
            <div class="stock-list" id="stockList"></div>
            <div style="text-align:center;">
                <button class="btn-admin" onclick="updateAllStocks()">Simpan Semua Perubahan</button>
            </div>
            <div id="statusMessage" class="status-message"></div>
            <div class="back-link" style="text-align:center; margin-top:20px;">
                <a href="index.html" target="_blank">Kembali ke Toko</a>
            </div>
        </div>
    </div>

    <script>
        let config = {};
        let originalStocks = {}; // untuk menyimpan stok saat login

        function loginWithToken() {
            const token = document.getElementById('githubToken').value.trim();
            const owner = document.getElementById('repoOwner').value.trim();
            const repo = document.getElementById('repoName').value.trim();
            const path = document.getElementById('filePath').value.trim();
            const branch = document.getElementById('branch').value.trim();

            if (!token || !owner || !repo || !path || !branch) {
                alert('Semua field harus diisi!');
                return;
            }

            config = { token, owner, repo, path, branch };

            fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}?ref=${branch}`, {
                headers: { 'Authorization': `token ${token}` }
            })
            .then(res => {
                if (!res.ok) throw new Error('Token tidak valid atau file tidak ditemukan');
                return res.json();
            })
            .then(data => {
                const content = atob(data.content);
                originalStocks = JSON.parse(content);
                config.sha = data.sha;

                // Tampilkan form stok
                renderStockForm(originalStocks);
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('stockSection').style.display = 'block';
                document.getElementById('statusMessage').innerHTML = '';
            })
            .catch(err => {
                alert('Gagal login: ' + err.message);
            });
        }

        function renderStockForm(stocks) {
            const container = document.getElementById('stockList');
            container.innerHTML = '';
            for (let [productName, stock] of Object.entries(stocks)) {
                const div = document.createElement('div');
                div.className = 'stock-item';
                div.innerHTML = `
                    <label>${productName}</label>
                    <input type="number" id="stock-${productName.replace(/\s+/g, '-')}" value="${stock}" min="0">
                `;
                container.appendChild(div);
            }
        }

        function updateAllStocks() {
            if (!config.sha) {
                alert('Silakan login ulang');
                return;
            }

            // Kumpulkan semua nilai stok dari form
            const updatedStocks = {};
            const inputs = document.querySelectorAll('#stockList .stock-item input');
            inputs.forEach(input => {
                // Ambil nama produk dari label di depan input
                const label = input.previousElementSibling.textContent;
                const value = parseInt(input.value);
                if (isNaN(value) || value < 0) {
                    alert(`Stok untuk ${label} harus angka valid`);
                    return;
                }
                updatedStocks[label] = value;
            });

            const content = btoa(JSON.stringify(updatedStocks, null, 2));

            fetch(`https://api.github.com/repos/${config.owner}/${config.repo}/contents/${config.path}`, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${config.token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: 'Update stok via admin panel',
                    content: content,
                    sha: config.sha,
                    branch: config.branch
                })
            })
            .then(res => {
                if (!res.ok) throw new Error('Gagal update');
                return res.json();
            })
            .then(data => {
                config.sha = data.content.sha;
                document.getElementById('statusMessage').innerHTML = '<span style="color:green;">✅ Stok berhasil diupdate!</span>';
                setTimeout(() => document.getElementById('statusMessage').innerHTML = '', 3000);
            })
            .catch(err => {
                document.getElementById('statusMessage').innerHTML = `<span style="color:red;">❌ Error: ${err.message}</span>`;
            });
        }

        function logout() {
            config = {};
            originalStocks = {};
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('stockSection').style.display = 'none';
        }
    </script>
</body>
</html>
